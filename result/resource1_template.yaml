- GEOIP,facebook,默认代理,no-resolve
- GEOIP,google,默认代理,no-resolve
- GEOIP,netflix,默认代理,no-resolve
- GEOIP,twitter,默认代理,no-resolve
- GEOSITE,category-ai-!cn,默认代理
- GEOSITE,spotify,默认代理
- GEOSITE,github,默认代理
