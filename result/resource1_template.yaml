- GEOSITE,category-anticensorship,默认代理
- GEOSITE,category-dev-cn,DIRECT
- GEOSITE,bing,DIRECT
- GEOSITE,microsoft@cn,DIRECT
- GEOSITE,microsoft,DIRECT
- GEOSITE,tencent,DIRECT
- GEOSITE,baidu,DIRECT
- GEOSITE,alibaba,DIRECT
- GEOSITE,wps,DIRECT
