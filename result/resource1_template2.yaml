proxy-providers: {}
external-ui-url: https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip
dns:
  enable: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  prefer-h3: false
  respect-rules: true
  use-hosts: false
  use-system-hosts: false
  ipv6: false
  fake-ip-filter:
  - +.lan
  - +.local
  - +.msftconnecttest.com
  - +.msftncsi.com
  - localhost.ptlogin2.qq.com
  - localhost.sec.qq.com
  - +.in-addr.arpa
  - +.ip6.arpa
  - time.*.com
  - time.*.gov
  - pool.ntp.org
  - localhost.work.weixin.qq.com
  default-nameserver:
  - 223.5.5.5
  - 1.2.4.8
  nameserver:
  - https://208.67.222.222/dns-query
  - https://77.88.8.8/dns-query
  - https://1.1.1.1/dns-query
  - https://8.8.4.4/dns-query
  direct-nameserver-follow-policy: false
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
    - 240.0.0.0/4
    - 0.0.0.0/32
    domain:
    - +.google.com
    - +.facebook.com
    - +.youtube.com
  fallback: []
  proxy-server-nameserver:
  - https://223.5.5.5/dns-query
  - https://doh.pub/dns-query
  direct-nameserver:
  - https://223.5.5.5/dns-query
  - https://doh.pub/dns-query
  nameserver-policy:
    geosite:private,cn:
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query
global-client-fingerprint: chrome
profile:
  store-fake-ip: true
  store-selected: true
sniffer:
  enable: true
  skip-domain:
  - +.push.apple.com
  sniff:
    HTTP:
      override-destination: true
      ports:
      - 80
      - 8080-8880
    QUIC:
      ports:
      - 443
      - 8443
    TLS:
      ports:
      - 443
      - 8443
tun:
  auto-detect-interface: true
  auto-redirect: true
  auto-route: true
  dns-hijack:
  - any:53
  enable: true
  stack: mixed
  device: Meta
  strict-route: false
  mtu: 1500
