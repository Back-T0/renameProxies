name: 定时清理执行日志

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  actions: write

jobs:
  delete-workflow-runs:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 删除旧工作流运行记录
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAINTAIN_SPAN: "3d"
        run: python .github/scripts/cleanup_workflow_runs.py
